services:
  - type: web
    name: contract-analyzer-backend
    env: python
    plan: free
    buildCommand: "cd contract-analyzer && pip install -r requirements.txt"
    startCommand: "cd contract-analyzer && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
